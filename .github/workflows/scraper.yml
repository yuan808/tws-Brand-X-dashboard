name: TWS Dashboard 数据自动更新

on:
  # 每天北京时间 8:00 和 20:00 各跑一次（UTC+8，对应 UTC 0:00 和 12:00）
  schedule:
    - cron: '0 0 * * *'   # 北京时间 08:00
    - cron: '0 12 * * *'  # 北京时间 20:00

  # 允许手动在 GitHub Actions 页面点击触发
  workflow_dispatch:
    inputs:
      only:
        description: '只跑指定爬虫 (jd/pdd/rss/taobao，留空则全跑)'
        required: false
        default: ''
      skip_pdd:
        description: '跳过拼多多 (true/false)'
        required: false
        default: 'false'

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # 超过30分钟自动取消，防止卡死

    steps:
      # 1. 拉取代码
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. 安装 Python
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      # 3. 安装依赖
      - name: Install Python deps
        run: |
          pip install -r scraper/requirements.txt

      # 4. 安装 Playwright 浏览器内核（Chromium）
      - name: Install Playwright Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      # 5. 运行爬虫
      - name: Run scrapers
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.skip_pdd }}" = "true" ]; then
            ARGS="$ARGS --skip-pdd"
          fi
          if [ -n "${{ github.event.inputs.only }}" ]; then
            ARGS="$ARGS --only ${{ github.event.inputs.only }}"
          fi
          python scraper/run_all.py $ARGS

      # 6. 检查 data.json 是否生成成功
      - name: Verify output
        run: |
          if [ ! -f "data.json" ]; then
            echo "❌ data.json 未生成！"
            exit 1
          fi
          SIZE=$(wc -c < data.json)
          echo "✅ data.json 生成成功，大小: ${SIZE} bytes"
          # 打印最后更新时间
          python3 -c "
          import json
          d = json.load(open('data.json'))
          print('更新时间:', d['_meta']['updated_at_cn'])
          print('商品条数:', len(d.get('products', [])))
          print('资讯条数:', len(d.get('news', [])))
          print('热词条数:', d.get('taobao', {}).get('total_words', 0))
          "

      # 7. 将 data.json 提交回仓库（仪表板通过 GitHub Pages 读取它）
      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # 只有有变化时才提交
          git diff --cached --quiet || git commit -m "🤖 auto: update data.json $(date +'%Y-%m-%d %H:%M') UTC"

      # 8. 推送到仓库
      - name: Push changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}

      # 9. 上传日志为 Artifact（方便排查爬虫失败原因）
      - name: Upload scraper log
        if: always()   # 即使爬虫失败也上传日志
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log-${{ github.run_id }}
          path: scraper/scraper.log
          retention-days: 7
